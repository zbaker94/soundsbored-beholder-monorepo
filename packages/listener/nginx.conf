server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: unknown paths fall back to the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Runtime config is regenerated per container start — never cache it.
    location = /config.js {
        add_header Cache-Control "no-store";
    }
}
