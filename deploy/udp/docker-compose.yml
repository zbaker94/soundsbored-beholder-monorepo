# Full self-host stack: SFU + relay (token) + Beholder listener + Caddy (TLS).
# One command brings up an internet-reachable backend with no third-party
# service. Run from this directory on a host with a public IP and a domain:
#
#   cd deploy/udp
#   cp .env.example .env      # set DOMAIN, ROOM_PASSWORD, LIVEKIT_API_*
#   docker compose up -d --build
#
# DNS: point BEHOLDER_HOST and RELAY_HOST at this host. Open ports 80, 443,
# 443/udp (Caddy) and 7881/tcp, 7882/udp (LiveKit media, direct).
#
# Consumers use tokenEndpoint = https://{RELAY_HOST} (which fronts BOTH the token
# endpoint and the LiveKit SFU). The Beholder listener is served at
# https://{BEHOLDER_HOST} with the relay endpoint injected + locked, so users
# enter only room + password.

services:
  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit/livekit.yaml
    environment:
      # LiveKit reads keys from this env as "key: secret".
      - 'LIVEKIT_KEYS=${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}'
    volumes:
      - ./livekit.yaml:/etc/livekit/livekit.yaml:ro
    ports:
      - '7881:7881' # media TCP fallback — DIRECT (not via Caddy)
      - '7882:7882/udp' # media UDP preferred — DIRECT (not via Caddy)
    restart: unless-stopped

  token:
    build:
      context: ../..
      dockerfile: packages/relay/Dockerfile
    environment:
      - ROOM_PASSWORD=${ROOM_PASSWORD}
      - SFU_URL=wss://${RELAY_HOST}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - PORT=8080
    restart: unless-stopped

  beholder:
    build:
      context: ../..
      dockerfile: packages/listener/Dockerfile
    environment:
      # Injected + shown read-only ("set by host"): the endpoint (relay host,
      # cross-origin — relay CORS is `*`) and the room. Only the password stays
      # for the listener to enter. Leave ROOM unset in .env to let listeners pick
      # the room instead.
      - LISTENER_TOKEN_ENDPOINT=https://${RELAY_HOST}
      - LISTENER_ROOM=${ROOM}
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - token
      - beholder
      - livekit
    environment:
      - BEHOLDER_HOST=${BEHOLDER_HOST}
      - RELAY_HOST=${RELAY_HOST}
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp' # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
